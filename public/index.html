<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 Aurababy Market</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,800;0,900;1,800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;font-weight:800;}
body{overflow-x:hidden;background:#0f0f1a;color:#e8e8f0;}
:root{--bg:#0f0f1a;--sidebar:#12121e;--card:#1a1a2e;--border:#252540;--text:#e8e8f0;--muted:#777;--accent:#7c5cbf;--gold:#f5c842;--green:#2ecc71;--red:#e74c3c;--blue:#3498db;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:#12121e;}::-webkit-scrollbar-thumb{background:#2a2a50;border-radius:3px;}
/* AUTH */
#auth-container{display:flex;justify-content:center;align-items:center;min-height:100vh;background:radial-gradient(ellipse at 60% 40%,#1a0d30 0%,#0f0f1a 70%);padding:20px;}
#auth-box{background:#12121e;border:1px solid #252540;padding:40px;border-radius:20px;box-shadow:0 0 60px rgba(124,92,191,.25);max-width:440px;width:100%;}
.auth-title{text-align:center;color:#f5c842;font-size:30px;font-weight:900;margin-bottom:4px;letter-spacing:-0.5px;}
.auth-sub{text-align:center;color:#777;font-size:13px;margin-bottom:28px;}
.auth-input{width:100%;padding:13px 15px;margin:7px 0;border:2px solid #252540;border-radius:10px;font-size:14px;font-family:'Poppins',sans-serif;font-weight:800;background:#0f0f1a;color:#e8e8f0;transition:border .2s;}
.auth-input:focus{outline:none;border-color:#7c5cbf;}
.auth-input::placeholder{color:#555;font-weight:600;}
.auth-btn{width:100%;padding:13px;margin:6px 0;border:none;border-radius:10px;font-size:15px;font-family:'Poppins',sans-serif;font-weight:900;cursor:pointer;transition:all .25s;color:#fff;}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4);}
.btn-primary{background:linear-gradient(135deg,#7c5cbf,#5a3d9a);}
.btn-secondary{background:#1e1e35;}
.btn-guest{background:#162030;}
.err{color:#e74c3c;text-align:center;margin:6px 0;font-size:13px;font-weight:800;}
.ok{color:#2ecc71;text-align:center;margin:6px 0;font-size:13px;font-weight:800;}
.loading{text-align:center;padding:40px;color:#e8e8f0;}
.spinner{border:4px solid #252540;border-top:4px solid #7c5cbf;border-radius:50%;width:48px;height:48px;animation:spin 1s linear infinite;margin:20px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
/* TICKER */
.ticker-bar{background:#0d0d18;border-bottom:1px solid #1e1e35;padding:7px 0;overflow:hidden;white-space:nowrap;position:sticky;top:0;z-index:200;}
.ticker-track{display:inline-flex;gap:28px;animation:tickMove 40s linear infinite;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes tickMove{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.t-item{display:inline-flex;align-items:center;gap:5px;font-size:11px;}
.t-up{color:#2ecc71;}.t-down{color:#e74c3c;}.t-flat{color:#777;}
/* LAYOUT */
.sidebar{width:215px;height:calc(100vh - 33px);background:#12121e;padding:14px;position:fixed;top:33px;overflow-y:auto;border-right:1px solid #1e1e35;z-index:100;}
.main{margin-left:215px;padding:22px;width:calc(100% - 215px);min-height:calc(100vh - 33px);}
/* SIDEBAR */
.sb-title{font-size:17px;font-weight:900;color:#f5c842;text-align:center;margin-bottom:14px;letter-spacing:-0.3px;}
.sb-stats{background:#0f0f1a;border:1px solid #1e1e35;border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;}
.sb-row{margin-bottom:7px;color:#777;}
.sb-val{font-size:15px;color:#f5c842;display:block;}
.sb-timer{border-top:1px solid #1e1e35;padding-top:8px;margin-top:8px;}
.sb-timer-label{font-size:10px;color:#555;font-weight:800;}
.sb-timer-val{font-size:13px;font-weight:900;}
.nb{width:100%;padding:9px 11px;margin-bottom:5px;background:#1a1a2e;color:#e8e8f0;border:1px solid #252540;border-radius:7px;cursor:pointer;font-size:12px;font-family:'Poppins',sans-serif;font-weight:900;transition:all .2s;text-align:left;}
.nb:hover{background:#222240;border-color:#7c5cbf;}
.nb.active{background:#7c5cbf;border-color:#7c5cbf;color:#fff;}
.nb-logout{background:#1a0f0f;color:#e74c3c;border-color:#2a1515;}
.nb-logout:hover{background:#2a1515;}
.sb-foot{font-size:10px;color:#444;text-align:center;margin-top:12px;font-weight:600;}
/* NAMETAG */
.nametag-display{background:linear-gradient(135deg,#7c5cbf33,#0f0f1a);border:1px solid #7c5cbf55;border-radius:7px;padding:5px 10px;text-align:center;margin-bottom:10px;font-size:12px;color:#b894ff;cursor:pointer;}
.nametag-display:hover{border-color:#7c5cbf;color:#d4aaff;}
/* CARDS */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:13px;margin-top:14px;}
.card{border:1px solid #252540;border-radius:11px;padding:11px;background:#1a1a2e;cursor:pointer;transition:all .2s;position:relative;overflow:visible;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.5);border-color:#7c5cbf;}
.c-img{width:100%;height:125px;border-radius:7px;overflow:hidden;margin-bottom:7px;}
.c-img img{width:100%;height:100%;object-fit:cover;}
.c-emoji{width:100%;height:125px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:55px;margin-bottom:7px;}
.c-name{font-size:12px;font-weight:900;color:#e8e8f0;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-price{font-size:17px;font-weight:900;color:#f5c842;margin:4px 0;}
.c-info{font-size:10px;color:#777;margin:2px 0;font-weight:600;}
.c-btn{width:100%;padding:7px;margin-top:5px;border:none;border-radius:6px;font-size:11px;font-weight:900;font-family:'Poppins',sans-serif;cursor:pointer;transition:all .2s;}
.buy-btn{background:#2ecc71;color:#fff;}
.buy-btn:hover{filter:brightness(1.1);}
.buy-btn:disabled{background:#1a2a1a;color:#555;cursor:not-allowed;}
.sell-btn{background:#e74c3c;color:#fff;}
.sell-btn:hover{filter:brightness(1.1);}
.owned-b{position:absolute;top:7px;right:7px;background:#7c5cbf;color:#fff;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:900;}
/* RARITY */
.r-common{border-color:#7f8c8d!important;}
.r-rare{border-color:#2980b9!important;box-shadow:0 0 8px rgba(41,128,185,.2);}
.r-epic{border-color:#8e44ad!important;box-shadow:0 0 10px rgba(142,68,173,.25);}
.r-legendary{border-color:#e67e22!important;box-shadow:0 0 12px rgba(230,126,34,.3);}
.r-divine{border-color:#9b59b6!important;box-shadow:0 0 15px rgba(155,89,182,.35);}
.r-cosmical{border-color:#00d4ff!important;box-shadow:0 0 20px rgba(0,212,255,.4);animation:cGlow 3s ease-in-out infinite alternate;}
@keyframes cGlow{from{box-shadow:0 0 10px rgba(0,212,255,.25);}to{box-shadow:0 0 26px rgba(0,212,255,.6);}}
.r-badge{position:absolute;top:7px;left:7px;padding:2px 7px;border-radius:8px;font-size:9px;font-weight:900;color:#fff;}
.rb-common{background:#7f8c8d;}
.rb-rare{background:linear-gradient(135deg,#2980b9,#1a5a8a);}
.rb-epic{background:linear-gradient(135deg,#8e44ad,#6c3483);}
.rb-legendary{background:linear-gradient(135deg,#e67e22,#b35a10);}
.rb-divine{background:linear-gradient(135deg,#9b59b6,#6c3483);}
.rb-cosmical{background:linear-gradient(135deg,#00d4ff,#0066ff);}
/* ENHANCERS */
.enh-slots{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap;}
.enh-slot{width:26px;height:26px;border-radius:5px;border:1px solid #252540;display:flex;align-items:center;justify-content:center;font-size:13px;}
.enh-slot.filled{background:#7c5cbf;border-color:#7c5cbf;}
.apply-enh{width:100%;padding:5px;background:linear-gradient(135deg,#7c5cbf,#6c3483);color:#fff;border:none;border-radius:5px;font-size:10px;font-weight:900;cursor:pointer;margin-top:5px;font-family:'Poppins',sans-serif;}
.apply-enh:disabled{background:#1a1a2e;color:#555;cursor:not-allowed;}
/* STATS GRID */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.stat-box{padding:14px 16px;border-radius:10px;border:1px solid transparent;}
.sb-gold{background:#1e1600;border-color:#3a2c00;}
.sb-blue{background:#0a1520;border-color:#0d2540;}
.sb-purple{background:#140d22;border-color:#2a1a44;}
.sb-green{background:#0a1a10;border-color:#0d2a18;}
.sb-red{background:#1a0d0d;border-color:#2a1515;}
.sb-teal{background:#0a1a18;border-color:#0d2a24;}
.stat-label{font-size:10px;color:#777;margin-bottom:5px;font-weight:800;}
.stat-val{font-size:24px;font-weight:900;color:#f5c842;}
/* TABS */
.tabs{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
.tab{padding:7px 14px;background:#1a1a2e;color:#777;border:1px solid #252540;border-radius:7px;cursor:pointer;font-size:11px;font-weight:900;font-family:'Poppins',sans-serif;transition:all .2s;}
.tab:hover{border-color:#7c5cbf;color:#e8e8f0;}
.tab.active{background:#7c5cbf;border-color:#7c5cbf;color:#fff;}
/* TRADE */
.trade-card{background:#1a1a2e;border:1px solid #252540;border-radius:11px;padding:16px;margin-bottom:12px;}
.trade-section{background:#0f0f1a;border-radius:7px;padding:10px;margin:6px 0;font-size:12px;}
.trade-sect-title{font-size:10px;color:#777;margin-bottom:5px;font-weight:900;}
.t-btn{padding:7px 14px;border:none;border-radius:7px;font-size:11px;font-weight:900;cursor:pointer;font-family:'Poppins',sans-serif;}
.tb-accept{background:#2ecc71;color:#fff;}
.tb-decline{background:#e74c3c;color:#fff;}
.tb-cancel{background:#252540;color:#e8e8f0;}
.tb-accent{background:#7c5cbf;color:#fff;}
.trade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:7px;max-height:270px;overflow-y:auto;padding:3px;}
.tg-item{background:#0f0f1a;border:1px solid #252540;border-radius:7px;padding:7px;cursor:pointer;text-align:center;font-size:10px;transition:all .15s;font-weight:800;}
.tg-item:hover{border-color:#7c5cbf;}
.tg-item.sel{border-color:#7c5cbf;background:#1a1030;}
.tg-item.lock{opacity:.4;cursor:not-allowed;}
/* TRADE HISTORY */
.th-item{padding:11px 14px;margin-bottom:7px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
.th-buy{background:#0a1a10;border:1px solid #1a4028;}
.th-sell{background:#1a0a0a;border:1px solid #401a1a;}
.th-trade{background:#0a0a1a;border:1px solid #1a1a40;}
/* LEADERBOARD */
.lb-table{width:100%;background:#1a1a2e;border-radius:11px;overflow:hidden;border:1px solid #252540;}
.lb-table table{width:100%;border-collapse:collapse;}
.lb-table th{background:#0f0f1a;color:#777;padding:12px 14px;text-align:left;font-size:11px;font-weight:900;}
.lb-table td{padding:11px 14px;border-bottom:1px solid #1e1e35;font-size:12px;font-weight:800;}
.lb-table tr:hover td{background:#1e1e38;}
.lb-rank{font-size:18px;font-weight:900;color:#7c5cbf;}
.lb-me td{background:#1a1030!important;border-left:3px solid #f5c842;}
/* PLAYER CARD */
.pl-card{background:#1a1a2e;border:1px solid #252540;border-radius:11px;padding:14px;cursor:pointer;transition:all .2s;}
.pl-card:hover{border-color:#7c5cbf;transform:translateY(-2px);}
.pl-avatar{width:44px;height:44px;background:linear-gradient(135deg,#7c5cbf,#5a3d9a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.pl-name{font-size:14px;font-weight:900;color:#e8e8f0;}
.pl-worth{font-size:12px;color:#f5c842;font-weight:900;}
.mini-tag{background:#0f0f1a;border-radius:5px;padding:2px 7px;font-size:10px;color:#777;font-weight:800;}
/* MODAL */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.82);display:flex;justify-content:center;align-items:center;z-index:1000;padding:14px;}
.modal{background:#1a1a2e;border:1px solid #252540;padding:24px;border-radius:14px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;}
.modal-title{font-size:18px;font-weight:900;color:#e8e8f0;margin-bottom:14px;}
.modal-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.mb{flex:1;padding:11px;border:none;border-radius:7px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Poppins',sans-serif;min-width:90px;}
.mb-ok{background:#2ecc71;color:#fff;}
.mb-no{background:#e74c3c;color:#fff;}
.mb-grey{background:#252540;color:#e8e8f0;}
.mb-purple{background:#7c5cbf;color:#fff;}
/* FORM */
.form-grp{margin-bottom:14px;}
.form-lbl{display:block;margin-bottom:6px;font-size:12px;color:#777;font-weight:900;}
.form-in{width:100%;padding:10px 12px;border:1px solid #252540;border-radius:7px;font-size:13px;font-family:'Poppins',sans-serif;font-weight:800;background:#0f0f1a;color:#e8e8f0;}
.form-in:focus{outline:none;border-color:#7c5cbf;}
.form-in::placeholder{color:#444;font-weight:600;}
.form-sel{width:100%;padding:10px 12px;border:1px solid #252540;border-radius:7px;font-size:13px;font-family:'Poppins',sans-serif;font-weight:800;background:#0f0f1a;color:#e8e8f0;}
.form-sel option{background:#1a1a2e;}
/* NOTIF */
.notif{position:fixed;top:16px;right:16px;background:#1a1a2e;border:1px solid #252540;padding:14px 18px;border-radius:10px;box-shadow:0 6px 28px rgba(0,0,0,.6);z-index:2000;min-width:270px;max-width:330px;animation:nIn .28s ease;}
@keyframes nIn{from{transform:translateX(360px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.n-ok{border-left:4px solid #2ecc71;}.n-err{border-left:4px solid #e74c3c;}.n-info{border-left:4px solid #3498db;}
.n-title{font-size:13px;font-weight:900;color:#e8e8f0;margin-bottom:3px;}
.n-msg{font-size:11px;color:#777;font-weight:600;}
/* SECTION */
.view-title{font-size:24px;font-weight:900;color:#e8e8f0;margin-bottom:4px;letter-spacing:-0.4px;}
.view-sub{font-size:12px;color:#777;margin-bottom:18px;font-weight:700;}
.section-hd{font-size:16px;font-weight:900;color:#e8e8f0;margin:18px 0 10px;}
/* LOCKED OVERLAY */
.lock-ov{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.62);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;z-index:5;}
/* GRAPH */
.graph-wrap{background:#0f0f1a;border-radius:8px;padding:12px;margin-top:12px;}
.graph-tabs{display:flex;gap:6px;margin-bottom:10px;}
.g-tab{padding:4px 11px;border:1px solid #252540;border-radius:6px;background:#1a1a2e;color:#777;font-size:10px;font-weight:900;cursor:pointer;font-family:'Poppins',sans-serif;}
.g-tab.active{background:#7c5cbf;border-color:#7c5cbf;color:#fff;}
/* PROFILE */
.profile-hdr{background:linear-gradient(135deg,#1a1030,#0f0a1a);border:1px solid #7c5cbf44;border-radius:12px;padding:24px;text-align:center;margin-bottom:22px;}
.profile-ava{width:72px;height:72px;background:linear-gradient(135deg,#7c5cbf,#5a3d9a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;margin:0 auto 10px;}
.profile-name{font-size:22px;font-weight:900;color:#e8e8f0;}
.profile-tag{font-size:14px;color:#b894ff;margin-top:3px;font-weight:800;}
/* MONEY INPUT ROW */
.money-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.mq-btn{padding:4px 9px;background:#0f0f1a;border:1px solid #252540;border-radius:5px;color:#e8e8f0;font-size:10px;font-weight:900;cursor:pointer;font-family:'Poppins',sans-serif;}
.mq-btn:hover{border-color:#7c5cbf;}
/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:#555;}
.empty-ico{font-size:44px;margin-bottom:12px;}
.empty-txt{font-size:14px;color:#555;font-weight:800;}
/* UTIL */
.divider{border:none;border-top:1px solid #1e1e35;margin:14px 0;}
.flex-b{display:flex;justify-content:space-between;align-items:center;}
.flex-c{display:flex;align-items:center;gap:8px;}
.g-8{gap:8px;}.g-12{gap:12px;}
.mt-8{margin-top:8px;}.mt-14{margin-top:14px;}.mt-20{margin-top:20px;}
.mb-8{margin-bottom:8px;}.mb-14{margin-bottom:14px;}
.gold{color:#f5c842;}.green{color:#2ecc71;}.red{color:#e74c3c;}.muted{color:#777;}
.w100{width:100%;}
@media(max-width:720px){.sidebar{width:100%;height:auto;position:relative;top:0;}.main{margin-left:0;width:100%;}.stats-row{grid-template-columns:1fr 1fr;}.card-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}}
</style>
</head>
<body>
<div id="auth-container">
  <div id="auth-box">
    <div class="auth-title">💰 Aurababy Market</div>
    <div class="auth-sub">Multiplayer Trading Game</div>
    <div id="lf">
      <div style="text-align:center;font-size:16px;font-weight:900;margin-bottom:16px;color:#e8e8f0;">Welcome Back!</div>
      <div id="le" class="err" style="display:none"></div>
      <input type="text" id="lu" class="auth-input" placeholder="Username">
      <input type="password" id="lp" class="auth-input" placeholder="Password">
      <button onclick="doLogin()" class="auth-btn btn-primary">Login</button>
      <button onclick="goSignup()" class="auth-btn btn-secondary">Create Account</button>
      <button onclick="doGuest()" class="auth-btn btn-guest">Play as Guest</button>
    </div>
    <div id="sf" style="display:none">
      <div style="text-align:center;font-size:16px;font-weight:900;margin-bottom:16px;color:#e8e8f0;">Create Account</div>
      <div id="se" class="err" style="display:none"></div>
      <input type="text" id="su" class="auth-input" placeholder="Username (3-20 chars)">
      <input type="password" id="sp" class="auth-input" placeholder="Password (min 6 chars)">
      <input type="password" id="sc" class="auth-input" placeholder="Confirm Password">
      <button onclick="doSignup()" class="auth-btn btn-primary">Create Account</button>
      <button onclick="goLogin()" class="auth-btn btn-secondary">Back to Login</button>
    </div>
    <div id="lscreen" style="display:none">
      <div class="loading"><div class="spinner"></div><div style="font-size:15px;font-weight:900;">Loading your game...</div></div>
    </div>
  </div>
</div>
<div id="game-container" style="display:none"><div id="root"></div></div>

<script>
const FC={apiKey:"AIzaSyBUXT3jdC1miTjbyG5dcuRdd8oSqzT4OMo",authDomain:"aurababymarket.firebaseapp.com",projectId:"aurababymarket",storageBucket:"aurababymarket.firebasestorage.app",messagingSenderId:"335246667462",appId:"1:335246667462:web:3b39c5bc78e05a674971c7"};
firebase.initializeApp(FC);
const auth=firebase.auth(),db=firebase.firestore();
let currentUserAuth=null,userDocRef=null;
window.gameState={username:'Trader',money:1000,portfolio:{},limitedInventory:{},limitedMintCounts:{},enhancerInventory:{},tradeHistory:[],highestMoney:1000,highestNetWorth:1000,nameTag:'',nameTagSet:false,createdAt:null};
function goLogin(){document.getElementById('lf').style.display='block';document.getElementById('sf').style.display='none';document.getElementById('le').style.display='none';}
function goSignup(){document.getElementById('lf').style.display='none';document.getElementById('sf').style.display='block';document.getElementById('se').style.display='none';}
async function doLogin(){
  const u=document.getElementById('lu').value.trim().toLowerCase(),p=document.getElementById('lp').value,err=document.getElementById('le');
  if(!u||!p){err.textContent='Enter username and password';err.style.display='block';return;}
  if(!/^[a-z0-9_]{3,20}$/.test(u)){err.textContent='Invalid username format';err.style.display='block';return;}
  try{err.style.display='none';await auth.signInWithEmailAndPassword(u+'@aurababymarket.app',p);}
  catch(e){err.textContent=e.code==='auth/user-not-found'?'Username not found':e.code==='auth/wrong-password'?'Wrong password':'Login failed';err.style.display='block';}
}
async function doSignup(){
  const u=document.getElementById('su').value.trim().toLowerCase(),p=document.getElementById('sp').value,c=document.getElementById('sc').value,err=document.getElementById('se');
  if(!/^[a-z0-9_]{3,20}$/.test(u)){err.textContent='Username: 3-20 chars, letters/numbers/underscore only';err.style.display='block';return;}
  if(['admin','moderator','system','guest','official','support'].includes(u)){err.textContent='Reserved username';err.style.display='block';return;}
  if(!p||p.length<6){err.textContent='Password min 6 characters';err.style.display='block';return;}
  if(p!==c){err.textContent='Passwords do not match';err.style.display='block';return;}
  try{
    err.style.display='none';
    const ud=await db.collection('usernames').doc(u).get();
    if(ud.exists){err.textContent='Username taken';err.style.display='block';return;}
    const r=await auth.createUserWithEmailAndPassword(u+'@aurababymarket.app',p);
    await db.collection('usernames').doc(u).set({uid:r.user.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await db.collection('users').doc(r.user.uid).set({username:u,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  }catch(e){err.textContent=e.code==='auth/email-already-in-use'?'Username taken':'Signup failed: '+e.message;err.style.display='block';}
}
async function doGuest(){const e=document.getElementById('le');try{e.style.display='none';await auth.signInAnonymously();}catch(err){e.textContent='Guest login failed';e.style.display='block';}}
async function doLogout(){if(confirm('Logout? Progress is saved.')){await saveGame();await auth.signOut();}}
auth.onAuthStateChanged(async(user)=>{
  if(user){
    currentUserAuth=user;userDocRef=db.collection('users').doc(user.uid);
    document.getElementById('lf').style.display='none';document.getElementById('sf').style.display='none';document.getElementById('lscreen').style.display='block';
    await loadGame();
    document.getElementById('auth-container').style.display='none';document.getElementById('game-container').style.display='block';
  }else{
    currentUserAuth=null;userDocRef=null;
    document.getElementById('auth-container').style.display='flex';document.getElementById('game-container').style.display='none';
    goLogin();
  }
});
async function loadGame(){
  if(!userDocRef)return;
  try{
    const doc=await userDocRef.get();
    if(doc.exists){
      const d=doc.data();
      window.gameState={username:d.username||(currentUserAuth.isAnonymous?'Guest':'Trader'),money:d.money??1000,portfolio:d.portfolio||{},limitedInventory:d.limitedInventory||{},limitedMintCounts:d.limitedMintCounts||{},enhancerInventory:d.enhancerInventory||{},tradeHistory:d.tradeHistory||[],highestMoney:d.highestMoney||1000,highestNetWorth:d.highestNetWorth||1000,nameTag:d.nameTag||'',nameTagSet:d.nameTagSet||false,createdAt:d.createdAt||null};
    }else{
      const username=currentUserAuth.isAnonymous?('Guest'+Math.floor(Math.random()*9999)):'Trader';
      window.gameState={username,money:50000,portfolio:{},limitedInventory:{},limitedMintCounts:{},enhancerInventory:{},tradeHistory:[],highestMoney:50000,highestNetWorth:50000,nameTag:'',nameTagSet:false,createdAt:new Date()};
      await saveGame();
    }
  }catch(e){console.error('Load failed',e);}
}
async function saveGame(){
  if(!userDocRef||!window.gameState)return;
  try{await userDocRef.set({...window.gameState,createdAt:window.gameState.createdAt||firebase.firestore.FieldValue.serverTimestamp(),lastSaved:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}
  catch(e){console.error('Save failed',e);}
}
setInterval(()=>{if(currentUserAuth&&window.gameState)saveGame();},30000);
window.addEventListener('beforeunload',()=>{if(currentUserAuth&&window.gameState)saveGame();});
</script>

const ENHANCERS=_E.map(([id,name,emoji,rarity,cost,boost])=>({id,name,emoji,rarity,cost,boost,stock:Math.max(1,Math.floor(8/(['common','uncommon','rare','epic','legendary','mythic','divine','cosmical'].indexOf(rarity)+1)))}));
const RARITY_C={common:'#666',uncommon:'#27ae60',rare:'#2980b9',epic:'#8e44ad',legendary:'#e67e22',mythic:'#c0392b',divine:'#9b59b6',cosmical:'#00d4ff'};

function getInitStock(){const s={};ENHANCERS.forEach(e=>{s[e.id]=Math.floor(Math.random()*(e.stock+1));});return s;}

// ============================

// ============================
const App=()=>{
  // Core state
  const[money,setMoney]=useState(window.gameState?.money||1000);
  const[username]=useState(window.gameState?.username||'Player');

  const[enhInv,setEnhInv]=useState(window.gameState?.enhancerInventory||{});
  const[history,setHistory]=useState(window.gameState?.tradeHistory||[]);
  // Prices
  const[bPrices,setBPrices]=useState(()=>{const p={};BABIES.forEach(b=>{p[b.id]=Math.round(50+Math.random()*200);});return p;});
  const[lValues,setLValues]=useState(()=>{const v={};LIMITED_ITEMS.forEach(i=>{v[i.id]=Math.round((i.minValue+i.maxValue)/2);});return v;});
  const[prevBP,setPrevBP]=useState({});
  const[tickerData,setTickerData]=useState([]);
  const[babyTimer,setBabyTimer]=useState(300);
  const[limTimer,setLimTimer]=useState(3600);
  const[enhStock,setEnhStock]=useState(getInitStock);
  // UI
  const[view,setView]=useState('market');
  const[mktTab,setMktTab]=useState('all');
  const[limTab,setLimTab]=useState('common');
  const[enhTab,setEnhTab]=useState('shop');
  const[tradeTab,setTradeTab]=useState('incoming');
  const[selBaby,setSelBaby]=useState(null);
  const[selLimited,setSelLimited]=useState(null);
  const[graphRange,setGraphRange]=useState('week');
  const[notif,setNotif]=useState(null);
  const[search,setSearch]=useState('');
  // Name tag modal
  const[ntModal,setNtModal]=useState(false);
  const[ntInput,setNtInput]=useState('');
  // Players
  const[players,setPlayers]=useState([]);
  const[loadingPl,setLoadingPl]=useState(false);
  const[viewPlayer,setViewPlayer]=useState(null);
  // Trading
  const[allOffers,setAllOffers]=useState([]);
  const[myOffers,setMyOffers]=useState([]);
  const[locked,setLocked]=useState({limiteds:[],enhancers:[]});
  const[newOffer,setNewOffer]=useState({give:{babies:{},limiteds:[],enhancers:[],money:0},want:{babies:{},limiteds:[],enhancers:[],money:0},target:''});
  // Enhance
  const[enhPickOpen,setEnhPickOpen]=useState(false);
  const[enhPickMode,setEnhPickMode]=useState(null); // {type:'limited'->pick enhancer, instId} or {type:'enhancer'->pick limited, enhId}
  // Price history
  const priceHistory=useRef({});
  const notifTimer=useRef(null);

  // Sync gameState
  useEffect(()=>{
    window.gameState.money=money;window.gameState.portfolio=portfolio;
    window.gameState.limitedInventory=limitedInv;window.gameState.limitedMintCounts=limitedMints;
    window.gameState.enhancerInventory=enhInv;window.gameState.tradeHistory=history;
    window.gameState.nameTag=nameTag;window.gameState.nameTagSet=nameTagSet;
    const nw=money+getPortVal()+getLimVal();
    if(nw>(window.gameState.highestNetWorth||0))window.gameState.highestNetWorth=nw;
    if(money>(window.gameState.highestMoney||0))window.gameState.highestMoney=money;
  },[money,portfolio,limitedInv,limitedMints,enhInv,history,nameTag,nameTagSet]);

  // Init price history with 200 simulated points spanning 30 days
  useEffect(()=>{
    const now=Date.now();
    const span=30*24*60*60*1000;
    const pts=200;
    const h={};
    BABIES.forEach(b=>{
      const cur=bPrices[b.id]||100;
      const arr=[];
      let p=cur*(0.5+Math.random()*0.5);
      for(let i=0;i<pts;i++){
        const t=now-span+(i/pts)*span;
        p=Math.max(10,Math.min(4999,p*(1+(Math.random()-0.46)*0.06)));
        arr.push({t,p:Math.round(p)});
      }
      arr.push({t:now,p:cur});
      h[b.id]=arr;
    });
    priceHistory.current=h;
  },[]);

  // Values helpers
  const getPortVal=useCallback(()=>Object.keys(portfolio).reduce((s,id)=>(portfolio[id]||0)*(bPrices[id]||0)+s,0),[portfolio,bPrices]);
  const getLimVal=useCallback(()=>Object.values(limitedInv).reduce((s,inst)=>{
    const item=LIMITED_ITEMS.find(x=>x.id===inst.itemId);if(!item)return s;
    const base=lValues[item.id]||item.minValue;
    const boost=(inst.enhancers||[]).reduce((b,eid)=>{const e=ENHANCERS.find(x=>x.id===eid);return b+(e?e.boost:0);},0);
    return s+Math.round(base*(1+boost/100));
  },0),[limitedInv,lValues]);
  const getInstVal=(inst)=>{
    const item=LIMITED_ITEMS.find(x=>x.id===inst.itemId);if(!item)return 0;
    const base=lValues[item.id]||item.minValue;
    const boost=(inst.enhancers||[]).reduce((b,eid)=>{const e=ENHANCERS.find(x=>x.id===eid);return b+(e?e.boost:0);},0);
    return Math.round(base*(1+boost/100));
  };
  const netWorth=()=>money+getPortVal()+getLimVal();

  const showNotif=(title,msg,type='info')=>{
    if(notifTimer.current)clearTimeout(notifTimer.current);
    setNotif({title,msg,type});
    notifTimer.current=setTimeout(()=>setNotif(null),3500);
  };

  // Baby prices every 5 min
  useEffect(()=>{
    const cd=setInterval(()=>setBabyTimer(p=>p<=1?300:p-1),1000);
    const pu=setInterval(()=>{
      setPrevBP(prev=>{
        setBPrices(pp=>{
          const np={...pp};const changes=[];
          BABIES.forEach(b=>{
            const ch=(Math.random()*0.2-0.1);
            const old=np[b.id]||100;
            const nv=Math.max(10,Math.min(4999,Math.round(old*(1+ch)*100)/100));
            np[b.id]=nv;
            if(Math.abs(nv-old)>0.5)changes.push({name:b.name,old,nv,up:nv>old});
            const h=priceHistory.current[b.id]||[];
            h.push({t:Date.now(),p:nv});
            if(h.length>500)h.shift();
            priceHistory.current[b.id]=h;
          });
          setTickerData(changes);
          setBabyTimer(300);
          return np;
        });
        return prev;
      });
    },300000);
    return()=>{clearInterval(cd);clearInterval(pu);};
  },[]);

  // Limited values every hour
  useEffect(()=>{
    const cd=setInterval(()=>setLimTimer(p=>p<=1?3600:p-1),1000);
    const pu=setInterval(()=>{
      setLValues(prev=>{const nv={...prev};LIMITED_ITEMS.forEach(i=>{const ch=(Math.random()*0.3-0.15);const old=nv[i.id]||i.minValue;nv[i.id]=Math.round(Math.max(i.minValue,Math.min(i.maxValue,old*(1+ch))));});return nv;});
      setLimTimer(3600);showNotif('💎 Limited Values Updated','Prices have shifted!','info');
    },3600000);
    return()=>{clearInterval(cd);clearInterval(pu);};
  },[]);

  // Income $200 every 5 min
  useEffect(()=>{const iv=setInterval(()=>{setMoney(p=>p+200);showNotif('💰 Income','You received $200!','ok');},300000);return()=>clearInterval(iv);},[]);

  // Enhancer stock refresh every 30 min
  useEffect(()=>{const iv=setInterval(()=>{setEnhStock(getInitStock());showNotif('🔄 Shop Restocked','Enhancers available!','info');},1800000);return()=>clearInterval(iv);},[]);

  // Update leaderboard
  useEffect(()=>{
    const uid=currentUserAuth?.uid;if(!uid||!db)return;
    const nw=netWorth();
    db.collection('leaderboard').doc(uid).set({username,nameTag,netWorth:nw,money,portfolioValue:getPortVal(),limitedsOwned:Object.keys(limitedInv).length,enhancersOwned:Object.keys(enhInv).length,totalTrades:history.length,lastUpdated:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(()=>{});
  },[money,portfolio,limitedInv]);

  // Trade listener
  useEffect(()=>{
    const uid=currentUserAuth?.uid;if(!uid||!db)return;
    const unsub=db.collection('tradeOffers').where('status','==','pending').orderBy('createdAt','desc').limit(50).onSnapshot(snap=>{
      const all=[];snap.forEach(d=>all.push({id:d.id,...d.data()}));
      setAllOffers(all.filter(o=>o.fromUid!==uid&&(!o.toUid||o.toUid===uid)));
      setMyOffers(all.filter(o=>o.fromUid===uid));
    },()=>{});
    return()=>unsub();
  },[]);

  // Load players
  const loadPlayers=async()=>{
    setLoadingPl(true);
    try{const s=await db.collection('leaderboard').orderBy('netWorth','desc').limit(50).get();const pl=[];s.forEach(d=>pl.push({id:d.id,...d.data()}));setPlayers(pl);}catch(e){}
    setLoadingPl(false);
  };
  useEffect(()=>{if(view==='players'||view==='leaderboard')loadPlayers();},[view]);

  // BUY/SELL babies
  const buyBaby=(id,price)=>{
    if(money<price){showNotif('❌ Insufficient Funds',`Need $${price.toLocaleString()}`,'err');return;}
    setMoney(p=>p-price);setPortfolio(p=>({...p,[id]:(p[id]||0)+1}));
    const b=BABIES.find(x=>x.id===id);
    setHistory(p=>[{id:Date.now(),type:'BUY',name:b.name,price,time:new Date().toLocaleString()},...p.slice(0,99)]);
    showNotif('✅ Bought!',`${b.name} for $${price.toLocaleString()}`,'ok');
  };
  const sellBaby=(id,price)=>{
    if(!(portfolio[id]>0)){showNotif('❌ None Owned','','err');return;}
    setMoney(p=>p+price);setPortfolio(p=>({...p,[id]:p[id]-1}));
    const b=BABIES.find(x=>x.id===id);
    setHistory(p=>[{id:Date.now(),type:'SELL',name:b.name,price,time:new Date().toLocaleString()},...p.slice(0,99)]);
    showNotif('💰 Sold!',`${b.name} for $${price.toLocaleString()}`,'ok');
  };

  // BUY limited
  const buyLimited=(item)=>{
    if(money<item.cost){showNotif('❌ Insufficient Funds',`Need $${item.cost.toLocaleString()}`,'err');return;}
    const cnt=(limitedMints[item.id]||0)+1;
    const instId=`${item.id}_${cnt}`;
    setMoney(p=>p-item.cost);
    setLimitedMints(p=>({...p,[item.id]:cnt}));
    setLimitedInv(p=>({...p,[instId]:{itemId:item.id,serial:cnt,enhancers:[],purchasePrice:item.cost}}));
    setHistory(p=>[{id:Date.now(),type:'BUY',name:item.name,price:item.cost,time:new Date().toLocaleString(),lim:true},...p.slice(0,99)]);
    showNotif('🎉 Acquired!',`${item.name} #${cnt}`,'ok');
    setSelLimited(null);
  };

  // BUY enhancer
  const buyEnhancer=(enh)=>{
    if(money<enh.cost){showNotif('❌ Insufficient Funds',`Need $${enh.cost.toLocaleString()}`,'err');return;}
    if((enhStock[enh.id]||0)<=0){showNotif('❌ Sold Out','Check back after restock!','err');return;}
    const uid2=`${enh.id}_${Date.now()}`;
    setMoney(p=>p-enh.cost);
    setEnhInv(p=>({...p,[uid2]:{enhancerId:enh.id,name:enh.name,emoji:enh.emoji,boost:enh.boost,rarity:enh.rarity}}));
    setEnhStock(p=>({...p,[enh.id]:Math.max(0,(p[enh.id]||0)-1)}));
    showNotif('⚡ Enhancer Bought!',`${enh.name} (+${enh.boost}%)`,'ok');
  };

  // APPLY enhancer
  const applyEnhancer=(instId,enhInvId)=>{
    const inst=limitedInv[instId];if(!inst){showNotif('❌ Not found','','err');return;}
    if((inst.enhancers||[]).length>=4){showNotif('❌ Max 4 Enhancers','This limited is full','err');return;}
    const enh=enhInv[enhInvId];if(!enh){showNotif('❌ Not found','','err');return;}
    if(locked.enhancers.includes(enhInvId)){showNotif('❌ Locked','In pending trade','err');return;}
    setLimitedInv(p=>({...p,[instId]:{...p[instId],enhancers:[...(p[instId].enhancers||[]),enh.enhancerId]}}));
    setEnhInv(p=>{const n={...p};delete n[enhInvId];return n;});
    showNotif('💫 Enhanced!',`Applied ${enh.name}!`,'ok');
    setEnhPickOpen(false);setEnhPickMode(null);
  };

  // NAME TAG
  const saveNameTag=()=>{
    if(!ntInput.trim()){showNotif('❌ Empty tag','Enter a name tag','err');return;}
    if(ntInput.length>24){showNotif('❌ Too long','Max 24 characters','err');return;}
    if(nameTagSet&&money<10000){showNotif('❌ Need $10,000','Changing name tag costs $10,000','err');return;}
    if(nameTagSet)setMoney(p=>p-10000);
    setNameTag(ntInput.trim());setNameTagSet(true);
    setNtModal(false);setNtInput('');
    showNotif('✅ Name Tag Set!',`"${ntInput.trim()}" — ${nameTagSet?'$10,000 charged':'Free!'}`,nameTagSet?'info':'ok');
  };

  // TRADE helpers
  const cntItems=side=>{let c=0;Object.values(side.babies||{}).forEach(q=>{if(q>0)c++;});c+=(side.limiteds||[]).length+(side.enhancers||[]).length;if(side.money>0)c++;return c;};
  const itemLabel=give=>{const p=[];Object.entries(give.babies||{}).forEach(([id,q])=>{const b=BABIES.find(x=>String(x.id)===String(id));if(b&&q>0)p.push(`${q}x ${b.name}`);});(give.limiteds||[]).forEach(id=>{const iid=id.split('_')[0];const item=LIMITED_ITEMS.find(x=>x.id===iid);p.push(item?`${item.emoji} ${item.name}`:id);});(give.enhancers||[]).forEach(id=>{const e=ENHANCERS.find(x=>id.startsWith(x.id));p.push(e?`${e.emoji} ${e.name}`:id);});if(give.money>0)p.push(`$${give.money.toLocaleString()}`);return p.length?p.join(', '):'(nothing)';};

  const postTrade=async()=>{
    const uid=currentUserAuth?.uid;if(!uid){showNotif('❌ Not logged in','','err');return;}
    if(cntItems(newOffer.give)===0){showNotif('❌ Add items to give','','err');return;}
    if(cntItems(newOffer.want)===0){showNotif('❌ Add items you want','','err');return;}
    if(cntItems(newOffer.give)>6||cntItems(newOffer.want)>6){showNotif('❌ Max 6 items per side','','err');return;}
    if((newOffer.give.money||0)>money){showNotif('❌ Not enough money','','err');return;}
    try{
      let toUid=null,toUsername=newOffer.target.trim();
      if(toUsername){
        const s=await db.collection('leaderboard').where('username','==',toUsername.toLowerCase()).limit(1).get();
        if(!s.empty)s.forEach(d=>{toUid=d.id;toUsername=d.data().username;});
      }
      await db.collection('tradeOffers').add({fromUid:uid,fromUsername:username,toUid,toUsername,give:newOffer.give,want:newOffer.want,status:'pending',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      setLocked(p=>({limiteds:[...p.limiteds,...(newOffer.give.limiteds||[])],enhancers:[...p.enhancers,...(newOffer.give.enhancers||[])]}));
      showNotif('📬 Trade Posted!',`Offer sent to ${toUsername||'anyone'}`,'ok');
      setNewOffer({give:{babies:{},limiteds:[],enhancers:[],money:0},want:{babies:{},limiteds:[],enhancers:[],money:0},target:''});
      setTradeTab('incoming');
    }catch(e){showNotif('❌ Failed',e.message,'err');}
  };

  const acceptTrade=async(offer)=>{
    const uid=currentUserAuth?.uid;if(!uid)return;
    const want=offer.want||{};
    if((want.money||0)>money){showNotif('❌ Need more money','','err');return;}
    for(const[bid,qty] of Object.entries(want.babies||{})){if((portfolio[bid]||0)<qty){const b=BABIES.find(x=>String(x.id)===String(bid));showNotif('❌ Missing',`Need ${qty}x ${b?.name||bid}`,'err');return;}}
    for(const id of(want.limiteds||[])){if(!limitedInv[id]){showNotif('❌ Missing limited',id,'err');return;}if(locked.limiteds.includes(id)){showNotif('❌ Locked',`${id} in trade`,'err');return;}}
    for(const id of(want.enhancers||[])){if(!enhInv[id]){showNotif('❌ Missing enhancer',id,'err');return;}}
    try{
      let nm=money-(want.money||0)+(offer.give?.money||0);
      let np={...portfolio};
      Object.entries(want.babies||{}).forEach(([id,q])=>{np[id]=(np[id]||0)-q;});
      Object.entries(offer.give?.babies||{}).forEach(([id,q])=>{np[id]=(np[id]||0)+q;});
      let nl={...limitedInv};
      (want.limiteds||[]).forEach(id=>{delete nl[id];});
      (offer.give?.limiteds||[]).forEach(id=>{nl[id]={itemId:id.split('_')[0],serial:parseInt(id.split('_')[1]||0),enhancers:[],tradedFrom:offer.fromUsername};});
      let ne={...enhInv};
      (want.enhancers||[]).forEach(id=>{delete ne[id];});
      (offer.give?.enhancers||[]).forEach(id=>{ne[id]={enhancerId:id.split('_')[0],tradedFrom:offer.fromUsername};});
      const batch=db.batch();

  const PriceGraph=({babyId})=>{
    const now=Date.now();
    const ranges={day:86400000,week:604800000,month:2592000000,all:Infinity};
    const hist=priceHistory.current[babyId]||[];
    const filtered=graphRange==='all'?hist:hist.filter(p=>now-p.t<=ranges[graphRange]);
    if(filtered.length<2)return<div style={{textAlign:'center',padding:20,color:'#555',fontSize:12}}>Not enough data for this range</div>;
    const prices=filtered.map(p=>p.p);
    const minP=Math.min(...prices)*0.95,maxP=Math.max(...prices)*1.05;
    const rng=maxP-minP||1;
    const W=480,H=140,pl=48,pr=10,pt=12,pb=22,gW=W-pl-pr,gH=H-pt-pb;
    const pts=filtered.map((p,i)=>({x:pl+(i/(filtered.length-1))*gW,y:pt+gH-((p.p-minP)/rng)*gH,p:p.p}));
    const poly=pts.map(p=>`${p.x},${p.y}`).join(' ');
    const area=`M ${pl} ${pt+gH} L ${pts.map(p=>`${p.x},${p.y}`).join(' L ')} L ${pl+gW} ${pt+gH} Z`;
    const isUp=prices[prices.length-1]>=prices[0];
    const col=isUp?'#2ecc71':'#e74c3c';
    const pct=((prices[prices.length-1]-prices[0])/prices[0]*100).toFixed(1);
    const gid=`g${babyId}`;
    return(
      <div className="graph-wrap">
        <div className="graph-tabs">
          {[['day','1D'],['week','1W'],['month','1M'],['all','ALL']].map(([r,l])=>(
            <button key={r} className={`g-tab ${graphRange===r?'active':''}`} onClick={()=>setGraphRange(r)}>{l}</button>
          ))}
        </div>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%'}}>
          <defs>
            <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={col} stopOpacity={0.25}/>
              <stop offset="100%" stopColor={col} stopOpacity={0.02}/>
            </linearGradient>
          </defs>
          {[0,.25,.5,.75,1].map(t=>(
            <g key={t}>
              <line x1={pl} y1={pt+t*gH} x2={pl+gW} y2={pt+t*gH} stroke="#1e1e35" strokeWidth={0.7}/>
              <text x={pl-4} y={pt+t*gH+3} fill="#555" fontSize={7.5} textAnchor="end" fontFamily="Poppins" fontWeight="800">${Math.round(minP+(1-t)*rng)}</text>
            </g>
          ))}
          <path d={area} fill={`url(#${gid})`}/>
          <polyline points={poly} fill="none" stroke={col} strokeWidth={2}/>
          <circle cx={pts[0].x} cy={pts[0].y} r={2.5} fill={col} opacity={0.7}/>
          <circle cx={pts[pts.length-1].x} cy={pts[pts.length-1].y} r={3.5} fill={col}/>
        </svg>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#777',marginTop:5}}>
          <span>${prices[0].toLocaleString()}</span>
          <span style={{color:col,fontWeight:900}}>{isUp?'▲':'▼'} {Math.abs(pct)}%</span>
          <span style={{color:col}}>${prices[prices.length-1].toLocaleString()}</span>
        </div>
      </div>
    );
  };

          <button className={`tab ${tradeTab==='new'?'active':''}`} onClick={()=>setTradeTab('new')}>➕ New Trade</button>
        </div>
        {tradeTab==='incoming'&&(
          allOffers.length>0?allOffers.map(o=>(
            <div key={o.id} className="trade-card">
              <div className="flex-b mb-8"><span style={{color:'#f5c842',fontWeight:900,fontSize:13}}>From: {o.fromUsername}</span><span style={{color:'#777',fontSize:11}}>{o.toUid?'→ You':'Public'}</span></div>
              <div className="trade-section"><div className="trade-sect-title">THEY GIVE:</div><div style={{color:'#2ecc71',fontSize:12}}>{itemLabel(o.give||{})}</div></div>
              <div className="trade-section"><div className="trade-sect-title">THEY WANT:</div><div style={{color:'#e74c3c',fontSize:12}}>{itemLabel(o.want||{})}</div></div>
              <div style={{display:'flex',gap:8,marginTop:10}}><button className="t-btn tb-accept" onClick={()=>acceptTrade(o)}>✅ Accept</button><button className="t-btn tb-decline" onClick={async()=>await db.collection('tradeOffers').doc(o.id).update({status:'declined'})}>❌ Decline</button></div>
            </div>
          )):<div className="empty"><div className="empty-ico">📬</div><div className="empty-txt">No incoming offers</div></div>
        )}
        {tradeTab==='mine'&&(
          myOffers.length>0?myOffers.map(o=>(
            <div key={o.id} className="trade-card">
              <div className="flex-b mb-8"><span style={{color:'#f5c842',fontWeight:900,fontSize:13}}>To: {o.toUsername||'Anyone'}</span><span style={{background:'#f39c12',color:'#fff',padding:'2px 9px',borderRadius:10,fontSize:10}}>PENDING</span></div>
              <div className="trade-section"><div className="trade-sect-title">YOU GIVE:</div><div style={{color:'#e74c3c',fontSize:12}}>{itemLabel(o.give||{})}</div></div>
              <div className="trade-section"><div className="trade-sect-title">YOU WANT:</div><div style={{color:'#2ecc71',fontSize:12}}>{itemLabel(o.want||{})}</div></div>
              <button className="t-btn tb-cancel mt-8" onClick={()=>cancelOffer(o.id)}>Cancel Offer</button>
            </div>
          )):<div className="empty"><div className="empty-ico">📤</div><div className="empty-txt">No active offers</div></div>
        )}
        {tradeTab==='new'&&(
          <div>
            <div className="form-grp"><div className="form-lbl">Target Player (leave blank for public offer)</div><input className="form-in" placeholder="Enter username..." value={newOffer.target} onChange={e=>setNewOffer(p=>({...p,target:e.target.value}))}/></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <TradeSide side="give" label="📤 You Give" col="#e74c3c"/>
              <TradeSide side="want" label="📥 You Want" col="#2ecc71"/>
            </div>
            <div style={{textAlign:'center',marginTop:16}}>
              <button className="t-btn tb-accept" style={{padding:'11px 36px',fontSize:14}} onClick={postTrade}>📬 Post Trade Offer</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  const PlayersView=()=>(
    <div>
      <div className="view-title">👥 Players</div>
      <div className="view-sub">All traders • Click to view profile and send trade offers</div>
      {loadingPl?<div className="loading"><div className="spinner"/><div>Loading...</div></div>:(
        players.length>0?(
          <div className="card-grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))'}}>
            {players.map((p,i)=>{
              const isMe=p.id===currentUserAuth?.uid;
              return(
                <div key={p.id} className="pl-card" style={{position:'relative'}} onClick={()=>setViewPlayer(p)}>
                  {isMe&&<span style={{position:'absolute',top:10,right:10,background:'#f5c842',color:'#000',padding:'1px 7px',borderRadius:10,fontSize:10,fontWeight:900}}>YOU</span>}
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                    <div className="pl-avatar">{(p.username||'?')[0].toUpperCase()}</div>
                    <div>
                      <div className="pl-name">{i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':''}{p.username}</div>
                      {p.nameTag&&<div style={{fontSize:11,color:'#b894ff',fontWeight:800}}>{p.nameTag}</div>}
                      <div className="pl-worth">${(p.netWorth||0).toLocaleString()}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                    <span className="mini-tag">💰 ${(p.money||0).toLocaleString()}</span>
                    <span className="mini-tag">💎 {p.limitedsOwned||0}</span>
                    <span className="mini-tag">🔄 {p.totalTrades||0} trades</span>
                  </div>
                </div>
              );
            })}
          </div>
        ):<div className="empty"><div className="empty-ico">👥</div><div className="empty-txt">No players yet</div></div>
      )}
    </div>
  );

  const LeaderboardView=()=>(
    <div>
      <div className="view-title">🏆 Leaderboard</div>
      <div className="view-sub">Top 50 players by net worth</div>
      {loadingPl?<div className="loading"><div className="spinner"/><div>Loading...</div></div>:(
        <div className="lb-table">
          <table>
            <thead><tr><th>#</th><th>Player</th><th>Net Worth</th><th>Cash</th><th>Limiteds</th><th>Trades</th></tr></thead>
            <tbody>
              {players.map((p,i)=>{
                const isMe=p.id===currentUserAuth?.uid;
                return(
                  <tr key={p.id} className={isMe?'lb-me':''} style={{cursor:'pointer'}} onClick={()=>setViewPlayer(p)}>
                    <td><span className="lb-rank">{i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}</span></td>
                    <td><div style={{fontWeight:900}}>{p.username}{isMe?' (You)':''}</div>{p.nameTag&&<div style={{fontSize:10,color:'#b894ff'}}>{p.nameTag}</div>}</td>
                    <td style={{color:'#f5c842',fontWeight:900}}>${(p.netWorth||0).toLocaleString()}</td>
                    <td style={{color:'#2ecc71'}}>${(p.money||0).toLocaleString()}</td>
                    <td>{p.limitedsOwned||0}</td>
                    <td>{p.totalTrades||0}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );

  const HistoryView=()=>(
    <div>
      <div className="view-title">📜 Trade History</div>
      <div className="view-sub">{history.length} transactions</div>
      {history.length>0?history.slice(0,50).map(t=>(
        <div key={t.id} className={`th-item ${t.type==='SELL'?'th-sell':t.isTrade?'th-trade':'th-buy'}`}>
          <div style={{flex:1}}><strong>{t.type}</strong>: {t.name} {t.lim?'💎':t.trade?'🤝':''}<div style={{fontSize:11,color:'#555'}}>{t.time}</div></div>
          {t.price>0&&<div style={{fontSize:17,fontWeight:900,color:t.type==='SELL'?'#2ecc71':'#e74c3c'}}>${t.price.toLocaleString()}</div>}
        </div>
      )):<div className="empty"><div className="empty-ico">📜</div><div className="empty-txt">No trades yet</div></div>}
    </div>
  );

  const ProfileView=()=>{
    const myLims=Object.entries(limitedInv);
    const myEnhs=Object.entries(enhInv);
    const ownedBabies=BABIES.filter(b=>(portfolio[b.id]||0)>0);
    return(
      <div>
        <div className="profile-hdr">
          <div className="profile-ava">{(username||'?')[0].toUpperCase()}</div>
          <div className="profile-name">{username}</div>
          {nameTag?<div className="profile-tag">"{nameTag}"</div>:<div style={{fontSize:12,color:'#555',marginTop:3}}>No name tag set</div>}
          <button style={{marginTop:12,padding:'7px 22px',background:'#7c5cbf',border:'none',borderRadius:8,color:'#fff',fontSize:12,fontWeight:900,cursor:'pointer',fontFamily:'Poppins'}} onClick={()=>{setNtInput(nameTag);setNtModal(true);}}>
            {nameTagSet?`✏️ Change Tag ($10,000)`:'🏷️ Set Name Tag (Free)'}
          </button>
          <button style={{marginTop:8,padding:'7px 22px',background:'#e74c3c',border:'none',borderRadius:8,color:'#fff',fontSize:12,fontWeight:900,cursor:'pointer',fontFamily:'Poppins'}} onClick={()=>{
            if(confirm('⚠️ Reset your account? This gives you $50,000 fresh start but wipes ALL babies, limiteds, and history. Cannot be undone!')){
              setMoney(50000);
              setPortfolio({});
              setLimitedInv({});
              setLimitedMints({});
              setEnhInv({});
              setHistory([]);
              showNotif('💰 Account Reset!','You have been given $50,000 to start fresh. Good luck!','ok');
            }
          }}>🔄 Fresh Start ($50k)</button>
        </div>
        <div className="stats-row">
          <div className="stat-box sb-gold"><div className="stat-label">Net Worth</div><div className="stat-val">${num(netWorth())}</div></div>
          <div className="stat-box sb-blue"><div className="stat-label">Cash</div><div className="stat-val">${num(money)}</div></div>
          <div className="stat-box sb-purple"><div className="stat-label">Limiteds</div><div className="stat-val">{myLims.length}</div></div>
          <div className="stat-box sb-green"><div className="stat-label">Total Trades</div><div className="stat-val">{history.length}</div></div>
          <div className="stat-box sb-red"><div className="stat-label">Enhancers</div><div className="stat-val">{myEnhs.length}</div></div>
          <div className="stat-box sb-teal"><div className="stat-label">Baby Types</div><div className="stat-val">{ownedBabies.length}</div></div>
        </div>
        {ownedBabies.length>0&&<>
          <div className="section-hd">👶 Babies Owned</div>
          <div className="card-grid">
            {ownedBabies.map(baby=>{
              const q=portfolio[baby.id]||0;const p=bPrices[baby.id]||0;
              return(
                <div key={baby.id} className="card">
                  <div className="owned-b">×{q}</div>
                  <div className="c-img"><img src={baby.image} alt={baby.name} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>e.target.style.display='none'}/></div>
                  <div className="c-name">{baby.name}</div>
                  <div className="c-price">${num(q*p)}</div>
                </div>
              );
            })}
          </div>
        </>}
        {myLims.length>0&&<>
          <div className="section-hd">💎 Limited Items</div>
          <div className="card-grid">
            {myLims.map(([instId,inst])=>{
              const item=LIMITED_ITEMS.find(x=>x.id===inst.itemId);if(!item)return null;
              return(
                <div key={instId} className={`card r-${item.tier}`}>
                  <span className={`r-badge rb-${item.tier}`}>{item.tier.toUpperCase()}</span>
                  <div className="c-emoji" style={{fontSize:52,background:`linear-gradient(135deg,${TIER_C[item.tier]||'#555'}22,#0f0f1a)`}}>{item.emoji}</div>
                  <div className="c-name">{item.name} #{inst.serial}</div>
                  <div className="c-price" style={{color:TIER_C[item.tier]||'#f5c842'}}>${num(getInstVal(inst))}</div>
                  <div className="enh-slots">{[0,1,2,3].map(i=>{const eid=(inst.enhancers||[])[i];const e=eid?ENHANCERS.find(x=>x.id===eid):null;return<div key={i} className={`enh-slot ${eid?'filled':''}`}>{e?.emoji||''}</div>;})}</div>
                </div>
              );
            })}
          </div>
        </>}
      </div>
    );
  };

  // =====================
  // MODALS
  // =====================

  const BabyModal=()=>{
    if(!selBaby)return null;
    const price=bPrices[selBaby.id]||0,own=portfolio[selBaby.id]||0;
    return(
      <div className="overlay" onClick={()=>setSelBaby(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div style={{width:'100%',height:200,borderRadius:8,overflow:'hidden',marginBottom:14}}>
            <img src={selBaby.image} alt={selBaby.name} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>e.target.style.display='none'}/>
          </div>
          <div className="modal-title">{selBaby.name}</div>
          <div style={{fontSize:26,color:'#f5c842',fontWeight:900,margin:'6px 0'}}>${price.toLocaleString()}</div>
          <div style={{fontSize:12,color:'#777',marginBottom:4}}>You own: {own}</div>
          <PriceGraph babyId={selBaby.id}/>
          <div className="modal-btns">
            <button className="mb mb-ok" disabled={money<price} onClick={()=>{buyBaby(selBaby.id,price);setSelBaby(null);}}>BUY ${price.toLocaleString()}</button>
            {own>0&&<button className="mb mb-no" onClick={()=>{sellBaby(selBaby.id,price);setSelBaby(null);}}>SELL ${price.toLocaleString()}</button>}
            <button className="mb mb-grey" onClick={()=>setSelBaby(null)}>Close</button>
          </div>
        </div>
      </div>
    );
  };

  const LimitedModal=()=>{
    if(!selLimited)return null;
    const val=lValues[selLimited.id]||selLimited.minValue;
    const ownCnt=Object.values(limitedInv).filter(x=>x.itemId===selLimited.id).length;
    return(
      <div className="overlay" onClick={()=>setSelLimited(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <span className={`r-badge rb-${selLimited.tier}`} style={{position:'static',display:'inline-block',marginBottom:10}}>{selLimited.tier.toUpperCase()}</span>
          <div style={{fontSize:90,textAlign:'center',margin:'8px 0'}}>{selLimited.emoji}</div>
          <div className="modal-title">{selLimited.name}</div>
          <div style={{background:'#0f0f1a',borderRadius:8,padding:14,margin:'12px 0'}}>
            <div className="flex-b" style={{marginBottom:7}}><span style={{color:'#777',fontSize:12}}>Purchase Cost</span><span style={{color:'#f5c842',fontSize:15,fontWeight:900}}>${selLimited.cost.toLocaleString()}</span></div>
            <div className="flex-b" style={{marginBottom:7}}><span style={{color:'#777',fontSize:12}}>Current Value</span><span style={{color:TIER_C[selLimited.tier],fontSize:15,fontWeight:900}}>${val.toLocaleString()}</span></div>
            <div className="flex-b"><span style={{color:'#777',fontSize:12}}>Value Range</span><span style={{color:'#777',fontSize:12}}>${selLimited.minValue.toLocaleString()} – ${selLimited.maxValue.toLocaleString()}</span></div>
          </div>
          {ownCnt>0&&<div style={{color:'#2ecc71',fontSize:12,marginBottom:8}}>You own {ownCnt} of these</div>}
          <div style={{color:'#e74c3c',fontSize:11,marginBottom:14}}>⚠️ Cannot be sold — trade-only</div>
          <div className="modal-btns">
            <button className="mb mb-ok" disabled={money<selLimited.cost} onClick={()=>buyLimited(selLimited)}>BUY ${selLimited.cost.toLocaleString()}</button>
            <button className="mb mb-grey" onClick={()=>setSelLimited(null)}>Close</button>
          </div>
        </div>
      </div>
    );
  };

  const PlayerModal=()=>{
    if(!viewPlayer)return null;
    const isMe=viewPlayer.id===currentUserAuth?.uid;
    return(
      <div className="overlay" onClick={()=>setViewPlayer(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="profile-hdr">
            <div className="profile-ava" style={{width:60,height:60,fontSize:26}}>{(viewPlayer.username||'?')[0].toUpperCase()}</div>
            <div className="profile-name" style={{fontSize:18}}>{viewPlayer.username}</div>
            {viewPlayer.nameTag&&<div className="profile-tag">"{viewPlayer.nameTag}"</div>}
            {isMe&&<div style={{color:'#f5c842',fontSize:11,marginTop:5}}>This is you!</div>}
          </div>
          <div className="stats-row" style={{gridTemplateColumns:'1fr 1fr'}}>
            <div className="stat-box sb-gold"><div className="stat-label">Net Worth</div><div className="stat-val" style={{fontSize:18}}>${(viewPlayer.netWorth||0).toLocaleString()}</div></div>
            <div className="stat-box sb-blue"><div className="stat-label">Cash</div><div className="stat-val" style={{fontSize:18}}>${(viewPlayer.money||0).toLocaleString()}</div></div>
            <div className="stat-box sb-purple"><div className="stat-label">Limiteds</div><div className="stat-val" style={{fontSize:18}}>{viewPlayer.limitedsOwned||0}</div></div>
            <div className="stat-box sb-green"><div className="stat-label">Trades</div><div className="stat-val" style={{fontSize:18}}>{viewPlayer.totalTrades||0}</div></div>
          </div>
          {!isMe&&<button className="mb mb-purple w100 mt-14" onClick={()=>{setViewPlayer(null);setNewOffer(p=>({...p,target:viewPlayer.username}));setView('trading');setTradeTab('new');}}>🤝 Send Trade Offer</button>}
          <button className="mb mb-grey w100 mt-8" onClick={()=>setViewPlayer(null)}>Close</button>
        </div>
      </div>
    );
  };

  const NameTagModal=()=>{
    if(!ntModal)return null;
    return(
      <div className="overlay" onClick={()=>setNtModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:400}}>
          <div className="modal-title">🏷️ {nameTagSet?'Change Name Tag':'Set Name Tag'}</div>
          {nameTagSet&&<div style={{background:'#1a0a0a',border:'1px solid #e74c3c44',borderRadius:8,padding:10,marginBottom:14,fontSize:12,color:'#e74c3c'}}>⚠️ Changing your name tag costs <strong>$10,000</strong>. Your balance: ${money.toLocaleString()}</div>}
          {!nameTagSet&&<div style={{background:'#0a1a0a',border:'1px solid #2ecc7144',borderRadius:8,padding:10,marginBottom:14,fontSize:12,color:'#2ecc71'}}>🎉 First name tag is FREE!</div>}
          <div className="form-grp">
            <div className="form-lbl">Name Tag (max 24 chars)</div>
            <input className="form-in" placeholder="e.g. Diamond Trader, King of Aura..." value={ntInput} maxLength={24} onChange={e=>setNtInput(e.target.value)}/>
          </div>
          {ntInput&&<div style={{textAlign:'center',padding:'8px',background:'#0f0f1a',borderRadius:8,marginBottom:14,fontSize:13,color:'#b894ff',fontStyle:'italic'}}>Preview: "{ntInput}"</div>}
          <div className="modal-btns">
            <button className="mb mb-ok" onClick={saveNameTag}>{nameTagSet?`Save ($10,000)`:'Set Tag (Free)'}</button>
            <button className="mb mb-grey" onClick={()=>setNtModal(false)}>Cancel</button>
          </div>
        </div>
      </div>
    );
  };

  const EnhPickModal=()=>{
    if(!enhPickOpen||!enhPickMode)return null;
    const pickLimited=enhPickMode.type==='enhancer';
    return(
      <div className="overlay" onClick={()=>{setEnhPickOpen(false);setEnhPickMode(null);}}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-title">{pickLimited?'🎯 Pick a Limited':'⚡ Pick an Enhancer'}</div>
          <div className="trade-grid" style={{maxHeight:340}}>
            {pickLimited?Object.entries(limitedInv).filter(([,inst])=>(inst.enhancers||[]).length<4).map(([instId,inst])=>{
              const item=LIMITED_ITEMS.find(x=>x.id===inst.itemId);if(!item)return null;
              return<div key={instId} className="tg-item" onClick={()=>applyEnhancer(instId,enhPickMode.enhId)}><div style={{fontSize:26}}>{item.emoji}</div><div style={{fontSize:9}}>{item.name} #{inst.serial}</div><div style={{fontSize:9,color:'#777'}}>{(inst.enhancers||[]).length}/4</div></div>;
            }):Object.entries(enhInv).map(([invId,enh])=>{
              const islocked=locked.enhancers.includes(invId);
              return<div key={invId} className={`tg-item ${islocked?'lock':''}`} onClick={()=>!islocked&&applyEnhancer(enhPickMode.instId,invId)}><div style={{fontSize:26}}>{enh.emoji}</div><div style={{fontSize:9}}>{enh.name}</div><div style={{fontSize:9,color:RARITY_C[enh.rarity]}}>{enh.rarity}</div><div style={{fontSize:9,color:'#2ecc71'}}>+{enh.boost}%</div></div>;
            })}
          </div>
          <button className="mb mb-grey w100 mt-14" onClick={()=>{setEnhPickOpen(false);setEnhPickMode(null);}}>Cancel</button>
        </div>
      </div>
    );
  };

  // =====================
  // MAIN RENDER
  // =====================
  const NAV=[
    {id:'market',lbl:'🏪 Market'},
    {id:'portfolio',lbl:'📊 Portfolio'},
    {id:'limiteds',lbl:'💎 Limiteds'},
    {id:'enhancers',lbl:'⚡ Enhancers'},
    {id:'trading',lbl:`🤝 Trading${allOffers.length>0?` (${allOffers.length})`:''}` },
    {id:'players',lbl:'👥 Players'},
    {id:'leaderboard',lbl:'🏆 Leaderboard'},
    {id:'history',lbl:`📜 History (${history.length})`},
    {id:'profile',lbl:'👤 Profile'},
  ];

  return(
    <div>
      <Ticker/>
      <div style={{display:'flex'}}>
        <div className="sidebar">
          <div className="sb-title">💰 Aurababy</div>
          {/* Name tag clickable */}
          <div className="nametag-display" onClick={()=>{setNtInput(nameTag);setNtModal(true);}}>
            {nameTag?`"${nameTag}"`:nameTagSet?'(no tag)':'🏷️ Set Name Tag'}
          </div>
          <div className="sb-stats">
            <div className="sb-row"><span style={{fontSize:10,color:'#555',fontWeight:900}}>PLAYER</span><span className="sb-val">{username}</span></div>
            <div className="sb-row"><span style={{fontSize:10,color:'#555',fontWeight:900}}>CASH</span><span className="sb-val">${num(money)}</span></div>
            <div className="sb-row"><span style={{fontSize:10,color:'#555',fontWeight:900}}>NET WORTH</span><span className="sb-val">${num(netWorth())}</span></div>
            <div className="sb-timer">
              <div className="sb-timer-label">BABIES UPDATE</div>
              <div className="sb-timer-val" style={{color:'#e74c3c'}}>{fmt(babyTimer)}</div>
              <div className="sb-timer-label" style={{marginTop:5}}>LIMITEDS UPDATE</div>
              <div className="sb-timer-val" style={{color:'#9b59b6'}}>{fmt(limTimer)}</div>
            </div>
          </div>
          {NAV.map(n=><button key={n.id} className={`nb ${view===n.id?'active':''}`} onClick={()=>setView(n.id)}>{n.lbl}</button>)}
          <button className="nb nb-logout" onClick={doLogout}>🚪 Logout</button>
          <div className="sb-foot">Auto-saves every 30s<br/>$200 income every 5min</div>
        </div>
        <div className="main">
          {view==='market'&&<MarketView/>}
          {view==='portfolio'&&<PortfolioView/>}
          {view==='limiteds'&&<LimitedsView/>}
          {view==='enhancers'&&<EnhancersView/>}
          {view==='trading'&&<TradingView/>}
          {view==='players'&&<PlayersView/>}
          {view==='leaderboard'&&<LeaderboardView/>}
          {view==='history'&&<HistoryView/>}
          {view==='profile'&&<ProfileView/>}
        </div>
      </div>
      <BabyModal/><LimitedModal/><PlayerModal/><NameTagModal/><EnhPickModal/>
      {notif&&<div className={`notif n-${notif.type}`}><div className="n-title">{notif.title}</div><div className="n-msg">{notif.msg}</div></div>}
    </div>
  );
};

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
